<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Khaliq's Site</title>
    <style>
        body { 
            background-color: white; 
            color: black; 
            transition: 0.3s; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            margin: 0;
            padding: 20px;
        }
        .dark-mode { 
            background-color: #121212 !important; 
            color: white !important; 
        }
        #themeBtn {
            margin: 20px;
            padding: 12px 24px;
            border-radius: 30px;
            border: 2px solid #555;
            cursor: pointer;
            font-weight: bold;
        }
        img { 
            width: 200px; 
            height: 200px;
            border-radius: 50%; 
            object-fit: cover;
            border: 5px solid #ccc;
            margin-top: 20px;
        }
        .whatsapp-link {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <button onclick="toggleTheme()" id="themeBtn">Switch to Dark Mode</button>

    <h1>Welcome to Abdul Khaliq's Website</h1>
    
    <img src="myphoto.jpg" alt="Abdul Khaliq">

    <br>
    <a href="https://wa.me/923375090102" class="whatsapp-link" target="_blank">
        💬 WhatsApp Me
    </a>

    <script>
        function toggleTheme() {
            var element = document.body;
            element.classList.toggle("dark-mode");
            
            var btn = document.getElementById("themeBtn");
            if (element.classList.contains("dark-mode")) {
                btn.innerHTML = "Switch to Light Mode";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
            } else {
                btn.innerHTML = "Switch to Dark Mode";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
            }
        }
    </script>

</body>
</html>
